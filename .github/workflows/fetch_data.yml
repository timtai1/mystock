name: Daily Stock Data Fetch

on:
  schedule:
    # 每天台灣時間 18:30 執行 (UTC 10:30)
    - cron: '30 10 * * 1-5'
  workflow_dispatch: # 允許手動觸發

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Fetch Daily K-line
        run: python fetch_daily_kline.py

      - name: Fetch Target Prices
        env:
          CMONEY_ACCOUNT: ${{ secrets.ACCOUNT }}
          CMONEY_PASSWORD: ${{ secrets.HASHED_PASSWORD }}
        run: python fetch_target_price.py

      - name: Clean Duplicates
        run: python clean_duplicates.py
- name: Checkout code
  uses: actions/checkout@v4
  with:
    fetch-depth: 0 # 取得完整歷史以利 rebase

- name: Set up Python
# ... (中間步驟不變)
- name: Commit and Push changes
  env:
    TZ: Asia/Taipei
  run: |
    git config --local user.email "github-actions[bot]@users.noreply.github.com"
    git config --local user.name "github-actions[bot]"

    # 先抓取遠端最新狀態
    git fetch origin main

    # 關鍵：先提交本地新資料
    git add .
    if ! git diff --quiet --staged; then
      git commit -m "Auto update stock data: $(date +'%Y-%m-%d %H:%M')"

      # 核心修正：使用 -X ours 策略進行 rebase
      # 如果 JSON 檔案衝突，自動以雲端剛抓好的這份為準
      git pull --rebase -X ours origin main
      git push origin main
    fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
